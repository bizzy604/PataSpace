# Purpose: Production stack for a VPS with an existing nginx + Certbot.
# Why important: Ships the API + web frontend the platform needs, alongside
#   other sites the host nginx already serves.
# Used by: Hostinger VPS — `docker compose -f docker-compose.vps.yml up -d`.
#
# TLS: handled by the host's existing nginx + Certbot (not Caddy). The host nginx
# reverse-proxies the API domain to localhost:3002 and the web domain to localhost:3003.
# The Caddyfile in this directory is an alternative for standalone VPS setups
# without a pre-existing nginx — see VPS_DEPLOY.md for both paths.
# Requires: .env file (copy .env.vps.example → .env, fill secrets).

name: pataspace

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pataspace}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      PATA_DB_APP_USER: ${PATA_DB_APP_USER:-pataspace_app}
      PATA_DB_APP_PASSWORD: ${PATA_DB_APP_PASSWORD:?set PATA_DB_APP_PASSWORD in .env}
      PATA_DB_MIGRATOR_USER: ${PATA_DB_MIGRATOR_USER:-pataspace_migrator}
      PATA_DB_MIGRATOR_PASSWORD: ${PATA_DB_MIGRATOR_PASSWORD:?set PATA_DB_MIGRATOR_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../apps/api/prisma/bootstrap:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pataspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api-migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: ${API_IMAGE:-pataspace-api:local}
    command: ["pnpm", "--filter", "@pataspace/api", "prisma:migrate:deploy"]
    env_file: [.env]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: ${API_IMAGE:-pataspace-api:local}
    env_file: [.env]
    environment:
      PORT: 3001
    ports:
      - "127.0.0.1:3002:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${WEB_PUBLIC_API_URL:-https://api.dalakenya.com/api/v1}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    image: ${WEB_IMAGE:-pataspace-web:local}
    environment:
      PORT: 3000
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?set CLERK_SECRET_KEY in .env}
      NEXT_PUBLIC_API_BASE_URL: ${WEB_PUBLIC_API_URL:-https://api.dalakenya.com/api/v1}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /auth/sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /auth/register
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /wallet
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /wallet
      NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /
    ports:
      - "127.0.0.1:3003:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
