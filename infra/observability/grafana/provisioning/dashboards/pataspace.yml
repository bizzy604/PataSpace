# Purpose: Tells Grafana to load the PataSpace dashboards from disk.
# Why important: Dashboards live in git (infra/observability/grafana/dashboards)
#   and are generated by scripts/generate-dashboards.mjs, so every environment
#   gets identical, reviewable dashboards.
# Used by: the grafana service (mounted at /etc/grafana/provisioning).

apiVersion: 1

providers:
  - name: pataspace
    folder: PataSpace
    type: file
    disableDeletion: false
    allowUiUpdates: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards/pataspace
      foldersFromFilesStructure: false
