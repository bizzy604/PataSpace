# Purpose: Alert rules for the platform underneath the API — Postgres, Redis,
#   host resources, and scrape targets.
# Why important: Database or host exhaustion takes the whole product down;
#   these rules give warning before that happens.
# Used by: prometheus.yml (rule_files: alerts/*.rules.yml).

groups:
  - name: pataspace-infrastructure
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Scrape target {{ $labels.job }} is down
          description: 'Prometheus cannot scrape {{ $labels.job }} ({{ $labels.instance }}) for 5 minutes.'

      - alert: PostgresDown
        expr: pg_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL is unreachable
          description: The postgres exporter cannot connect to PostgreSQL.

      - alert: PostgresTooManyConnections
        expr: >-
          sum(pg_stat_activity_count) > 0.8 * min(pg_settings_max_connections)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: PostgreSQL connections above 80% of max_connections
          description: '{{ $value }} active connections; connection exhaustion will reject new API requests.'

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis is unreachable
          description: The redis exporter cannot connect to Redis; rate limiting, idempotency, and queues are degraded.

      - alert: RedisMemoryHigh
        expr: >-
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
          and redis_memory_max_bytes > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Redis memory above 90% of maxmemory
          description: Redis is close to its memory limit; evictions or write failures are imminent.

      - alert: HostHighCpu
        expr: >-
          100 * (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: Host CPU above 90% for 15 minutes
          description: 'Sustained CPU saturation (currently {{ $value | printf "%.0f" }}%).'

      - alert: HostLowMemory
        expr: >-
          node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Host has less than 10% memory available
          description: 'Available memory is {{ $value | humanizePercentage }} of total; the OOM killer is next.'

      - alert: HostDiskSpaceLow
        expr: >-
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes < 0.15
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Filesystem {{ $labels.mountpoint }} below 15% free
          description: 'Postgres WAL and Prometheus TSDB both stop when disk fills.'

      - alert: HostDiskSpaceCritical
        expr: >-
          node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
          / node_filesystem_size_bytes < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: Filesystem {{ $labels.mountpoint }} below 5% free
          description: Imminent disk exhaustion on {{ $labels.instance }}.
