# Purpose: Prometheus scrape and alerting configuration for the PataSpace stack.
# Why important: Defines every metrics source (API, Postgres, Redis, host,
#   containers) and routes alert rules to Alertmanager.
# Used by: the prometheus service in infra/docker/docker-compose.observability.yml.
#
# The API scrape sends the bearer token from /prometheus/api-metrics-token; the
# compose entrypoint writes METRICS_TOKEN from .env into that file at startup,
# matching the API's MetricsAuthGuard.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: pataspace

rule_files:
  - alerts/*.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: pataspace-api
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /prometheus/api-metrics-token
    static_configs:
      - targets: [api:3001]

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: alertmanager
    static_configs:
      - targets: [alertmanager:9093]

  - job_name: grafana
    static_configs:
      - targets: [grafana:3000]
