# Purpose: Edge reverse-proxy routing for the composed production stack.
# Why important: Presents one origin to clients so the web app and its /api/*
#   calls share a host (no CORS), while preserving request metadata for the API.
# Used by: infra/nginx/Dockerfile. Upstreams are docker-compose service names.

upstream pataspace_api {
  server api:3001;
}

upstream pataspace_web {
  server web:3000;
}

server {
  listen 8080;
  server_name _;

  # Baseline security headers on every response. TLS is terminated upstream
  # (Caddy), so HSTS is honoured by browsers over the public HTTPS origin and
  # ignored over plain HTTP. A content CSP is intentionally left to the app;
  # frame-ancestors here gives clickjacking protection without risking the
  # Next.js/Clerk script and style loading.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'none'" always;

  # The NestJS global prefix is /api/v1, so the path is forwarded unchanged.
  location /api/ {
    proxy_pass http://pataspace_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location / {
    proxy_pass http://pataspace_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
