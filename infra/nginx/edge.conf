# Purpose: Edge reverse-proxy routing for the composed production stack.
# Why important: Presents one origin to clients so the web app and its /api/*
#   calls share a host (no CORS), while preserving request metadata for the API.
# Used by: infra/nginx/Dockerfile. Upstreams are docker-compose service names.

upstream pataspace_api {
  server api:3001;
}

upstream pataspace_web {
  server web:3000;
}

server {
  listen 8080;
  server_name _;

  # The NestJS global prefix is /api/v1, so the path is forwarded unchanged.
  location /api/ {
    proxy_pass http://pataspace_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-Id $request_id;
  }

  location / {
    proxy_pass http://pataspace_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
