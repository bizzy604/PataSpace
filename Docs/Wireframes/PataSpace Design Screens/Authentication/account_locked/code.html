<body class="bg-background text-on-surface h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 bg-background dark:bg-on-background flat no shadows" style="padding-top: env(safe-area-inset-top);">
<div class="flex items-center justify-between px-margin-horizontal h-touch-target w-full">
<button aria-label="Back" class="w-touch-target h-touch-target flex items-center justify-center text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-on-surface dark:text-on-primary-fixed absolute left-1/2 -translate-x-1/2">
                Security
            </h1>
<!-- Empty div to balance flex spacing -->
<div class="w-touch-target h-touch-target"></div>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-horizontal mt-touch-target mb-[calc(env(safe-area-inset-bottom)+80px)]">
<!-- Icon & Status Ring -->
<div class="relative mb-gutter-vertical flex items-center justify-center w-32 h-32">
<!-- Pulsing background ring -->
<div class="absolute inset-0 rounded-full bg-error/10 animate-ping" style="animation-duration: 3s;"></div>
<div class="absolute inset-4 rounded-full bg-error/20"></div>
<!-- Main Lock Icon -->
<div class="relative z-10 w-20 h-20 bg-surface-container-lowest rounded-full shadow-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[40px] text-error icon-fill">lock</span>
<!-- Warning Badge -->
<div class="absolute -top-1 -right-1 w-8 h-8 bg-error rounded-full flex items-center justify-center border-2 border-surface-container-lowest shadow-sm">
<span class="material-symbols-outlined text-[16px] text-on-error font-bold">priority_high</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center mb-gutter-vertical max-w-[320px]">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-unit">
                Account Temporarily Locked
            </h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                For your security, your account has been locked due to too many failed login attempts. Please wait 30 minutes or contact support to unlock it immediately.
            </p>
</div>
<!-- Countdown Timer Bento Card -->
<div class="w-full max-w-[320px] bg-surface-container-lowest rounded-xl shadow-[0_0_8px_rgba(0,0,0,0.04)] p-4 mb-8 flex items-center justify-between border border-error-container/30">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-error-container flex items-center justify-center text-error">
<span class="material-symbols-outlined icon-fill">timer</span>
</div>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Timeout Ends In</span>
<span class="font-headline-md text-headline-md text-on-surface tabular-nums" id="countdown-timer">29:58</span>
</div>
</div>
<!-- Minimal sparkline/progress indicator visual -->
<div class="w-12 h-12 relative flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 36 36">
<circle class="stroke-surface-variant" cx="18" cy="18" fill="none" r="16" stroke-width="3"></circle>
<circle class="stroke-error transition-all duration-1000 ease-linear" cx="18" cy="18" fill="none" r="16" stroke-dasharray="100 100" stroke-dashoffset="1" stroke-linecap="round" stroke-width="3"></circle>
</svg>
</div>
</div>

            </button>
<button class="w-full h-touch-target rounded-xl border-[2px] border-outline text-on-surface font-headline-sm text-headline-sm flex items-center justify-center hover:bg-surface-container-low active:scale-95 transition-all">
                Back to Login
            </button>

<!-- BottomNavBar intentionally suppressed as this is a transactional/dead-end screen -->
<script>
        // Simple countdown logic for visual feedback
        document.addEventListener('DOMContentLoaded', () => {
            const timerDisplay = document.getElementById('countdown-timer');
            let timeLeft = 29 * 60 + 58; // 29:58 in seconds

            setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        });
    </script>
