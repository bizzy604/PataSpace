<script>
        document.addEventListener('DOMContentLoaded', () => {
            const track = document.getElementById('carousel-track');
            const nextBtn = document.getElementById('next-btn');
            const indicators = document.querySelectorAll('.indicator');
            let currentSlide = 0;
            const totalSlides = 3;

            function updateCarousel() {
                // Update track position
                track.style.transform = `translateX(-${currentSlide * (100 / totalSlides)}%)`;
                
                // Update indicators
                indicators.forEach((ind, index) => {
                    if (index === currentSlide) {
                        ind.className = 'h-2 w-8 bg-primary-container rounded-full transition-all duration-300 indicator';
                    } else {
                        ind.className = 'h-2 w-2 bg-surface-variant rounded-full transition-all duration-300 indicator';
                    }
                });

                // Update button text
                if (currentSlide === totalSlides - 1) {
                    nextBtn.textContent = 'Get Started';
                } else {
                    nextBtn.textContent = 'Next';
                }
            }

            nextBtn.addEventListener('click', () => {
                if (currentSlide < totalSlides - 1) {
                    currentSlide++;
                    updateCarousel();
                } else {
                    // Action for Get Started (e.g., reset for demo or navigate)
                    currentSlide = 0;
                    updateCarousel();
                }
            });
        });
    </script>
