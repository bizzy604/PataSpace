<style>
        /* iOS style safe areas for demonstration */
        .iphone-frame {
            width: 393px;
            height: 852px;
            border: 8px solid #2f3131;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            background-color: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            margin: 40px auto;
        }
        
        .dynamic-island {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background-color: #000;
            border-radius: 20px;
            z-index: 100;
        }

        .home-indicator {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);

            height: 5px;
            background-color: #1a1c1c;

            z-index: 100;

        /* Hide number input spinners */
        input[type=number]::-webkit-inner-spin-button,

    body {

<body class="bg-surface-container flex items-center justify-center min-h-screen font-body-md text-on-surface">
<div class="iphone-frame flex flex-col bg-surface-container-lowest">
<div class="dynamic-island"></div>
<!-- Simulated Status Bar Space -->
<div class="h-14 w-full bg-surface-container-lowest"></div>
<!-- Top Navigation -->
<nav class="flex items-center justify-between px-margin-horizontal h-touch-target bg-surface-container-lowest shadow-sm z-50">
<button aria-label="Go back" class="h-touch-target w-touch-target flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface">Verify Phone</h1>
<div class="h-touch-target w-touch-target"></div> <!-- Spacer for centering -->
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-horizontal pt-8 pb-safe items-center bg-surface-container-lowest">
<!-- Hero Icon -->
<div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center mb-8 shadow-sm">
<span class="material-symbols-outlined text-[48px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Headings -->
<h2 class="font-headline-md text-headline-md text-on-surface mb-2 text-center">Enter Verification Code</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center mb-10 max-w-[280px]">
                We've sent a 6-digit code to your phone number +254 712 *** ***
            </p>
<!-- OTP Inputs -->
<div class="flex gap-2 justify-center mb-10 w-full" id="otp-container">
<input aria-label="Digit 1" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
<input aria-label="Digit 2" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
<input aria-label="Digit 3" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
<input aria-label="Digit 4" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
<input aria-label="Digit 5" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
<input aria-label="Digit 6" class="w-12 h-14 bg-surface-subtle border border-surface-subtle rounded-xl text-center font-headline-md text-headline-md text-on-surface focus:outline-none focus:border-[2px] focus:border-primary focus:bg-surface-container-lowest transition-colors" maxlength="1" placeholder="-" type="number"/>
</div>
<!-- Timer / Resend -->
<div class="text-center mb-auto">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Resend code in <span class="font-bold text-primary">0:45</span>
</p>
</div>
<!-- Bottom Action -->
<div class="w-full pb-10 pt-4">
<button class="w-full h-touch-target bg-outline-variant text-on-surface-variant rounded-full font-headline-sm text-headline-sm flex items-center justify-center transition-all cursor-not-allowed" disabled="" id="verify-btn">
                    Verify
                </button>
</div>
</main>
<div class="home-indicator"></div>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('#otp-container input');
            const verifyBtn = document.getElementById('verify-btn');

            // Auto-focus first input
            inputs[0].focus();

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Limit to 1 char
                    if (e.target.value.length > 1) {
                        e.target.value = e.target.value.slice(0, 1);
                    }
                    
                    // Move to next input
                    if (e.target.value !== '' && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }

                    checkCompletion();
                });

                input.addEventListener('keydown', (e) => {
                    // Move to previous input on backspace
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index - 1].value = '';
                    }
                });
            });

            function checkCompletion() {
                let isComplete = true;
                inputs.forEach(input => {
                    if (input.value === '') {
                        isComplete = false;
                    }
                });

                if (isComplete) {
                    verifyBtn.disabled = false;
                    verifyBtn.classList.remove('bg-outline-variant', 'text-on-surface-variant', 'cursor-not-allowed');
                    verifyBtn.classList.add('bg-primary', 'text-on-primary', 'active:scale-[0.98]', 'cursor-pointer');
                } else {
                    verifyBtn.disabled = true;
                    verifyBtn.classList.add('bg-outline-variant', 'text-on-surface-variant', 'cursor-not-allowed');
                    verifyBtn.classList.remove('bg-primary', 'text-on-primary', 'active:scale-[0.98]', 'cursor-pointer');
                }
            }
        });
    </script>
