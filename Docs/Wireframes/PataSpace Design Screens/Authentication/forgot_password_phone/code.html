<body class="bg-surface-container-lowest min-h-screen flex flex-col font-body-md text-on-surface antialiased overflow-x-hidden">
<!-- TopAppBar (Dark Shell Nav) -->
<header class="bg-inverse-surface flex justify-between items-center w-full px-margin-horizontal h-touch-target z-50 docked full-width top-0 text-primary-container shadow-none pt-safe-top">

<span class="material-symbols-outlined text-primary-container" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>

        </div>
<div class="h-touch-target w-touch-target flex items-center justify-end">
<!-- Empty placeholder to balance flex layout -->
</div>
</header>
<!-- Main Canvas (Transactional Flow - Bottom Nav Suppressed) -->
<main class="flex-1 flex flex-col px-margin-horizontal pt-gutter-vertical pb-safe-bottom">
<!-- Headers -->
<div class="mb-8 mt-4">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">
                Forgot Password?
            </h1>
<p class="font-body-md text-body-md text-secondary">
                Enter your registered phone number to receive a reset code.
            </p>
</div>
<!-- Form Elements -->
<form class="flex flex-col flex-1" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2 mb-8">
<label class="font-label-md text-label-md text-on-surface-variant font-bold ml-1" for="phone-input">
                    Phone Number
                </label>
<div class="flex items-center bg-surface-subtle rounded-xl px-4 py-3 border-2 border-transparent focus-within:border-primary-container transition-colors shadow-sm">
<span class="text-lg mr-2 select-none">🇰🇪</span>
<span class="font-body-md text-body-md text-on-surface-variant font-medium mr-3 select-none">+254</span>
<div class="h-6 w-px bg-outline-variant mr-3"></div>
<input autocomplete="tel-local" class="flex-1 bg-transparent border-none p-0 focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder-outline" id="phone-input" inputmode="numeric" pattern="[0-9]*" placeholder="712 345 678" type="tel"/>
</div>
</div>
<!-- Spacer to push button to bottom or keep it tight -->
<div class="flex-1"></div>
<!-- Action Button -->
<div class="mt-gutter-vertical mb-6">
<button class="w-full bg-primary-container text-on-primary-container rounded-xl py-4 flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-md" type="submit">
<span class="font-headline-sm text-headline-sm">Send Reset Code</span>
</button>
</div>
<!-- Contextual Help (Optional standard practice) -->
<div class="text-center pb-4">
<a class="font-label-md text-label-md text-primary-container font-medium hover:underline" href="#">
                    Need help? Contact Support
                </a>
</div>
