<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased pt-safe pb-safe">
<!-- TopAppBar (From JSON) -->
<header class="bg-inverse-surface dark:bg-inverse-surface text-primary-container dark:text-primary-fixed-dim font-headline-md text-headline-md-mobile flex justify-between items-center w-full px-margin-horizontal h-touch-target z-50 flat no shadows sticky top-0">
<button aria-label="Go back" class="w-touch-target h-touch-target flex items-center justify-start hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="arrow_back_ios">arrow_back_ios</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary-container">Reset Password</h1>
<div class="w-touch-target h-touch-target"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col px-margin-horizontal pt-gutter-vertical pb-gutter-vertical max-w-md mx-auto w-full">
<!-- Header Section -->
<div class="mb-8">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Create New Password</h2>
<p class="font-body-md text-body-md text-secondary">Your new password must be different from previous passwords.</p>
</div>
<!-- Form Section -->
<form class="space-y-gutter-vertical flex-grow flex flex-col">
<div class="space-y-component-gap">
<!-- New Password Field -->
<div class="relative">
<label class="block font-caption text-caption font-bold text-on-surface-variant mb-unit" for="new_password">New Password</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-subtle text-on-surface rounded-xl border-2 border-transparent focus:border-primary focus:ring-0 px-4 h-12 transition-colors font-body-md text-body-md pr-12" id="new_password" name="new_password" placeholder="Enter new password" type="password"/>
<button class="absolute right-0 top-0 h-12 w-12 flex items-center justify-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative">
<label class="block font-caption text-caption font-bold text-on-surface-variant mb-unit" for="confirm_password">Confirm New Password</label>
<div class="relative flex items-center">
<input class="w-full bg-surface-subtle text-on-surface rounded-xl border-2 border-transparent focus:border-primary focus:ring-0 px-4 h-12 transition-colors font-body-md text-body-md pr-12" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-0 top-0 h-12 w-12 flex items-center justify-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
</div>
<!-- Password Requirements Checklist -->
<div class="mt-4 p-4 bg-surface-container-low rounded-xl border border-surface-variant">
<ul class="space-y-2 font-label-md text-label-md text-secondary">
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-outline" data-icon="check_circle">check_circle</span>
                        Min 8 characters
                    </li>
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-outline" data-icon="check_circle">check_circle</span>
                        1 uppercase letter
                    </li>
<li class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-outline" data-icon="check_circle">check_circle</span>
                        1 number
                    </li>
</ul>
</div>
<!-- Spacer to push button to bottom if needed -->
<div class="flex-grow"></div>
<!-- Submit Button -->
<div class="mt-gutter-vertical pb-4">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-[16px] flex items-center justify-center shadow-lg active:scale-[0.98] transition-transform" type="submit">
                    Update Password
                </button>
</div>
</form>
</main>
<!-- Note: BottomNavBar is intentionally suppressed as this is a linear/transactional screen (Reset Password) per the JSON Logic Rules. -->
<script>
        // Simple script to toggle password visibility
        document.querySelectorAll('button[type="button"]').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                    icon.setAttribute('data-icon', 'visibility');
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                    icon.setAttribute('data-icon', 'visibility_off');
                }
            });
        });
    </script>
