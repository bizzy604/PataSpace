<style>
        /* Mobile-first optimizations */
        body {
            -webkit-tap-highlight-color: transparent;
            /* Mocking iPhone 14 Pro dimensions for the preview */
            width: 100vw;
            height: 100vh;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            background-color: #000; /* Outer background to show the phone shape */
        }
        
        .phone-container {
            background-color: #ffffff;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Safe area mimics */
        .pt-safe { padding-top: env(safe-area-inset-top, 47px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 34px); }
        
        /* Custom Input styling to match guidelines */
        .pataspace-input {
            background-color: #EDEDED !important;
            border: 2px solid transparent !important;
            transition: border-color 0.2s ease;
        }
        .pataspace-input:focus {
            border-color: #00667e !important;
            outline: none !important;
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-black flex items-center justify-center min-h-screen">
<div class="phone-container shadow-2xl rounded-[40px] md:rounded-[40px] md:max-h-[932px] md:max-w-[430px]">
<!-- Top App Bar (Transactional, No Global Nav Shell) -->
<header class="w-full z-50 bg-surface pt-safe flex items-center h-[100px] px-margin-horizontal shadow-sm">
<button class="h-touch-target w-touch-target flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'wght' 400;">arrow_back_ios_new</span>
</button>
<div class="flex-1 text-center pr-touch-target">
<h1 class="font-headline-sm text-headline-sm text-on-surface">Create Account</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-horizontal pt-gutter-vertical pb-[120px] bg-background">
<div class="mb-gutter-vertical">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-unit">Enter Your Phone Number</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Please provide your details to register. We'll send a verification code to your phone.</p>
</div>
<form class="space-y-component-gap">
<!-- First Name -->
<div class="flex flex-col">
<label class="font-caption text-caption font-bold text-on-surface-variant mb-1 uppercase tracking-wide">First Name</label>
<input class="pataspace-input w-full h-[48px] rounded-lg px-4 font-body-md text-body-md text-on-surface" placeholder="e.g. John" type="text"/>
</div>
<!-- Last Name -->
<div class="flex flex-col">
<label class="font-caption text-caption font-bold text-on-surface-variant mb-1 uppercase tracking-wide">Last Name</label>
<input class="pataspace-input w-full h-[48px] rounded-lg px-4 font-body-md text-body-md text-on-surface" placeholder="e.g. Doe" type="text"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col">
<label class="font-caption text-caption font-bold text-on-surface-variant mb-1 uppercase tracking-wide">Phone Number</label>
<div class="flex w-full h-[48px] rounded-lg overflow-hidden pataspace-input group focus-within:border-primary border-2 border-transparent">
<!-- Country Code Dropdown Mock -->
<div class="flex items-center justify-center px-3 bg-surface-variant border-r border-outline-variant">
<span class="text-xl mr-1">🇰🇪</span>
<span class="font-body-md text-body-md text-on-surface">+254</span>
</div>
<input class="flex-1 h-full px-4 bg-transparent border-none focus:ring-0 font-body-md text-body-md text-on-surface" placeholder="712 345 678" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col">
<label class="font-caption text-caption font-bold text-on-surface-variant mb-1 uppercase tracking-wide">Password</label>
<div class="relative w-full h-[48px]">
<input class="pataspace-input w-full h-full rounded-lg pl-4 pr-12 font-body-md text-body-md text-on-surface" placeholder="Create a secure password" type="password"/>
<button class="absolute right-0 top-0 h-full w-touch-target flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</form>
</main>
<!-- Sticky Bottom Action Area -->
<div class="absolute bottom-0 w-full bg-surface-container-lowest/90 backdrop-blur-md pt-component-gap pb-safe px-margin-horizontal shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] z-40">
<button class="w-full h-[52px] bg-primary text-on-primary font-headline-sm text-headline-sm rounded-xl active:scale-95 transition-transform flex items-center justify-center shadow-md">
                Continue
            </button>
<p class="font-caption text-caption text-on-surface-variant text-center mt-3 leading-relaxed">
                By tapping "Continue", you agree to PataSpace's <br/>
<a class="text-primary font-bold" href="#">Terms of Service</a> and <a class="text-primary font-bold" href="#">Privacy Policy</a>.
            </p>
</div>
</div>
