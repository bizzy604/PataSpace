<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>PataSpace - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#83d1ee",
                        "surface": "#ffffff", /* Overridden to white for login canvas */
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "status-error": "#FF3B30",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#434748",
                        "secondary": "#5f5e5e",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#e0e3e4",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed": "#001f28",
                        "inverse-on-surface": "#f0f1f1",
                        "background": "#ffffff",
                        "tertiary": "#5a5e5f",
                        "status-success": "#34C759",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-container-low": "#f3f3f4",
                        "primary-fixed": "#b7eaff",
                        "surface-tint": "#00677f",
                        "secondary-container": "#e4e2e1",
                        "on-surface": "#1a1c1c",
                        "inverse-surface": "#252525", /* Eerie Black */
                        "surface-container-high": "#e8e8e8",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-primary-container": "#ffffff",
                        "on-tertiary-fixed": "#181c1d",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed-dim": "#c3c7c8",
                        "secondary-fixed": "#e4e2e1",
                        "on-tertiary-container": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "on-primary-fixed-variant": "#004e60",
                        "surface-subtle": "#EDEDED", /* Anti-flash White */
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#3f484c",
                        "primary-fixed-dim": "#83d1ee",
                        "on-background": "#1a1c1c",
                        "tertiary-container": "#737778",
                        "on-secondary-container": "#656464",
                        "on-secondary": "#ffffff",
                        "status-warning": "#FFCC00",
                        "primary-container": "#28809a",
                        "outline": "#6f797d",
                        "surface-dim": "#dadada",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary": "#ffffff",
                        "primary": "#00667e", /* Teal */
                        "outline-variant": "#bec8cd",
                        "surface-variant": "#e2e2e2"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "input": "12px",
                        "card": "16px",
                        "button": "16px"
                    },
                    "spacing": {
                        "component-gap": "16px",
                        "unit": "8px",
                        "margin-horizontal": "16px",
                        "gutter-vertical": "24px",
                        "touch-target": "44px"
                    },
                    "fontFamily": {
                        "body-lg": ["DM Sans"],
                        "body-md": ["DM Sans"],
                        "headline-md": ["Poppins"],
                        "caption": ["DM Sans"],
                        "headline-lg": ["Poppins"],
                        "headline-lg-mobile": ["Poppins"],
                        "display-02": ["Poppins"],
                        "display-01": ["Poppins"],
                        "label-md": ["DM Sans"],
                        "headline-sm": ["Poppins"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-md": ["15px", {"lineHeight": "21px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "30px", "fontWeight": "600"}],
                        "caption": ["13px", {"lineHeight": "16px", "fontWeight": "700"}], /* Adjusted to 13pt bold per spec */
                        "headline-lg": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                        "display-02": ["34px", {"lineHeight": "41px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "display-01": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["13px", {"lineHeight": "18px", "fontWeight": "500"}],
                        "headline-sm": ["20px", {"lineHeight": "25px", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        /* Hide scrollbar for clean app-like feel */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #ffffff; /* pure white canvas */
        }
        /* Custom form reset for the specific design system needs */
        input:focus {
            box-shadow: none !important;
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col relative w-full max-w-[430px] mx-auto bg-surface overflow-x-hidden">
<!-- Simple Nav Area for Login (Non-Shell) -->
<header class="w-full pt-12 pb-4 px-margin-horizontal flex items-center justify-center">
<span class="font-label-md text-label-md text-on-surface-variant tracking-wide">Welcome Back</span>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-margin-horizontal mt-8">
<!-- Logo & Header -->
<div class="flex flex-col items-center mb-gutter-vertical">
<div class="w-24 h-24 mb-6 rounded-2xl flex items-center justify-center overflow-hidden">
<img alt="PataSpace Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCeBYeSwaWYsMs-mmzhIJz7Ja7nsbtMn3re8UKdFN0qrBGwleBZRBwfj0fXn9UtdbiG66DAA5AF5HKVMEk6d2NVrfVEM_nLfLehXzCkerZnum92Dc4XKx2P5j8N5S5TVy1J-HRm4YkDyBG6GDiYjOXMYL_Uq8NjRgy44SWVZxDMbnsLLLBP-sIi_TKzlfw5t0UBsvRnllhgLwgVg9KEr3TEh3UYkmaasuf27Yrpoa2PWa3eB7ilT7t4HsIHSlEJCw1Ff9GTwKGMPAnD"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Sign In</h1>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-component-gap mt-4 w-full">
<!-- Phone Number Input -->
<div class="flex flex-col">
<label class="font-caption text-caption text-on-surface mb-2 pl-1">Phone Number</label>
<div class="flex items-center bg-surface-subtle rounded-input h-[48px] px-4 border-2 border-transparent focus-within:border-primary transition-colors">
<span class="font-body-md text-body-md text-on-surface-variant pr-3 border-r border-outline-variant mr-3">+254</span>
<input autocomplete="tel" class="flex-1 bg-transparent border-none p-0 focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline outline-none w-full" placeholder="712 345 678" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col mt-2">
<label class="font-caption text-caption text-on-surface mb-2 pl-1">Password</label>
<div class="flex items-center bg-surface-subtle rounded-input h-[48px] px-4 border-2 border-transparent focus-within:border-primary transition-colors">
<input autocomplete="current-password" class="flex-1 bg-transparent border-none p-0 focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline outline-none w-full" placeholder="••••••••" type="password"/>
<button class="ml-2 text-on-surface-variant hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-1">
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
</form>
<!-- Bottom Action Area -->
<div class="mt-auto pt-10 pb-10 flex flex-col gap-4">
<button class="w-full bg-primary text-on-primary font-headline-sm text-[16px] leading-[20px] rounded-button min-h-touch-target h-[52px] flex items-center justify-center active:scale-[0.98] transition-transform">
                Sign In
            </button>
<button class="w-full bg-transparent border-[2px] border-primary text-primary font-headline-sm text-[16px] leading-[20px] rounded-button min-h-touch-target h-[52px] flex items-center justify-center active:scale-[0.98] transition-transform">
                Create New Account
            </button>
</div>
</main>
</body></html>
