<script>
        // Minimal script to handle overlay toggling on single tap (simulating iOS gallery behavior)
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('image-container');
            const topOverlay = document.getElementById('top-overlay');
            const bottomOverlay = document.getElementById('bottom-overlay');
            let overlaysVisible = true;

            // Simple tap to toggle overlays
            container.addEventListener('click', () => {
                overlaysVisible = !overlaysVisible;
                if(overlaysVisible) {
                    topOverlay.classList.remove('opacity-0');
                    bottomOverlay.classList.remove('opacity-0');
                } else {
                    topOverlay.classList.add('opacity-0');
                    bottomOverlay.classList.add('opacity-0');
                }
            });

            // Note: Full pinch-to-zoom, swipe, and double-tap gestures require a robust gesture library 
            // (like Hammer.js or native iOS implementation) and are omitted here for brevity,
            // focusing on the UI layout as requested.
        });
    </script>
