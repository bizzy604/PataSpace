<body class="antialiased h-screen w-full flex items-end justify-center overflow-hidden">
<!-- Background overlay (simulating the page behind) -->
<div class="fixed inset-0 bg-black/40 z-0"></div>
<!-- Bottom Sheet Modal -->
<div class="relative z-10 w-full max-w-[393px] h-[751px] bg-surface rounded-t-[32px] flex flex-col shadow-2xl transition-transform duration-300 transform translate-y-0" id="filter-sheet">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-2 pb-4">
<div class="w-9 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-horizontal flex justify-between items-center pb-gutter-vertical">
<h1 class="text-headline-lg font-headline-lg text-on-surface">Filters</h1>
<button class="text-primary-container font-label-md text-label-md bg-transparent border-none">Clear All</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-margin-horizontal pb-[100px] space-y-gutter-vertical hide-scrollbar">
<!-- County Selection -->
<div class="space-y-unit">
<h2 class="text-body-md font-bold text-on-surface">County</h2>
<div class="bg-surface-subtle p-1 rounded-lg flex w-full">
<button class="flex-1 py-1.5 bg-surface text-on-surface text-label-md font-label-md rounded shadow-sm text-center">Nairobi</button>
<button class="flex-1 py-1.5 text-on-surface-variant text-label-md font-label-md rounded text-center">Kiambu</button>
<button class="flex-1 py-1.5 text-on-surface-variant text-label-md font-label-md rounded text-center">Mombasa</button>
</div>
</div>
<!-- Neighborhoods -->
<div class="space-y-unit">
<h2 class="text-body-md font-bold text-on-surface">Neighborhoods</h2>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-primary-container text-on-primary-container rounded-full text-label-md font-label-md">Kilimani</button>
<button class="px-4 py-2 bg-surface text-on-surface border border-outline-variant rounded-full text-label-md font-label-md">Westlands</button>
<button class="px-4 py-2 bg-primary-container text-on-primary-container rounded-full text-label-md font-label-md">Lavington</button>
<button class="px-4 py-2 bg-surface text-on-surface border border-outline-variant rounded-full text-label-md font-label-md">Parklands</button>
<button class="px-4 py-2 bg-surface text-on-surface border border-outline-variant rounded-full text-label-md font-label-md">Kileleshwa</button>
</div>
</div>
<!-- Rent Range -->
<div class="space-y-unit">
<h2 class="text-body-md font-bold text-on-surface">Rent Range</h2>
<div class="pt-4 pb-2 px-2">
<div class="relative w-full h-1 bg-surface-variant rounded-full">
<div class="absolute h-full bg-primary-container rounded-full" style="left: 20%; right: 40%;"></div>
<div class="absolute w-6 h-6 bg-surface shadow-md border border-outline-variant rounded-full top-1/2 -translate-y-1/2" style="left: 20%;"></div>
<div class="absolute w-6 h-6 bg-surface shadow-md border border-outline-variant rounded-full top-1/2 -translate-y-1/2" style="left: 60%;"></div>
</div>
</div>
<div class="flex justify-between text-body-md text-on-surface-variant pt-2">
<span>10,000 KES</span>
<span>50,000 KES</span>
</div>
</div>
<!-- Bedrooms -->
<div class="space-y-unit">
<h2 class="text-body-md font-bold text-on-surface">Bedrooms</h2>
<div class="flex gap-2">
<button class="flex-1 py-2 bg-surface text-on-surface border border-outline-variant rounded-full text-label-md font-label-md">Any</button>
<button class="flex-1 py-2 bg-primary-container text-on-primary-container rounded-full text-label-md font-label-md">1+</button>

<input checked="" class="w-5 h-5 rounded border-outline-variant text-primary-container focus:ring-primary-container" type="checkbox"/>
<span class="text-body-md text-on-surface">Apartment</span>
</label>

</label>

<div class="absolute bottom-0 left-0 right-0 bg-surface border-t border-surface-variant px-margin-horizontal py-4 pb-safe flex justify-between items-center bg-opacity-95 backdrop-blur-md">
<span class="text-body-md text-on-surface-variant">156 listings</span>
<button class="bg-primary-container text-on-primary-container px-6 py-3 rounded-full font-headline-sm text-headline-sm shadow-md active:scale-95 transition-transform">
                Show Results
            </button>
</div>
</div>
<script>
        // Simple drag interaction stub for the handle
        const handle = document.querySelector('.w-9');
        const sheet = document.getElementById('filter-sheet');
        
        let startY = 0;
        let currentY = 0;
        
        handle.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });
        
        handle.addEventListener('touchmove', (e) => {
            const deltaY = e.touches[0].clientY - startY;
            if (deltaY > 0) {
                sheet.style.transform = `translateY(${deltaY}px)`;
            }
        });
        
        handle.addEventListener('touchend', (e) => {
            const deltaY = e.changedTouches[0].clientY - startY;
            if (deltaY > 100) {
                sheet.style.transform = `translateY(100%)`; // Dismiss
            } else {
                sheet.style.transform = `translateY(0)`; // Snap back
            }
        });
    </script>
</body></html>
