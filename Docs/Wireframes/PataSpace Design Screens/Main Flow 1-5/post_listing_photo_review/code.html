                        COVER
                    </div>
<!-- Delete Button -->
<button class="absolute top-2 right-2 w-6 h-6 bg-black/50 backdrop-blur-sm rounded-full flex items-center justify-center text-white active:scale-90 transition-transform z-10">
<span class="material-symbols-outlined text-[14px]">close</span>
</button>

<span class="material-symbols-outlined text-[12px]">location_on</span>
<span>Geo</span>
</div>
</div>

</button>
<div class="absolute bottom-2 left-2 flex items-center gap-1 bg-black/50 backdrop-blur-sm text-white font-caption text-caption px-1.5 py-0.5 rounded z-10">

<div class="absolute inset-0 bg-cover bg-center w-full h-full" data-alt="A modern bathroom featuring a glass walk-in shower, a sleek vanity with a large mirror, and high-quality chrome fixtures. The tiles are a light, neutral gray, giving the space a clean, spa-like feel suitable for a premium property listing." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBoYJmi5LP2VqlZD7IfQeOoJXKpV2xDq-9bvvessguryPOqLyIb0sdjgTGvRjVKFRKrDI-zRM3vJE40H4BOIhGpIeBeUqeIfExrnArhG6d6LSaywGQrgFhPSkTATeX7pqGnWmoEPb15WAbCNwTQ6OWPxeBwVf-H_23ALuGJfJTNYNf3wJaVgOLuON-fD1Caz56lldP-zfeQOMUdDLV6ZpqrR5k3WQlAc7o8cYBDnjo9DwOYYh6cevKpXWcGyo2IYlxwhltTWo2VRm3R')"></div>

</button>
<div class="absolute bottom-2 left-2 flex items-center gap-1 bg-black/50 backdrop-blur-sm text-white font-caption text-caption px-1.5 py-0.5 rounded z-10">

</div>
</div>
<!-- Add More Button -->
<button class="relative aspect-square rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-lowest flex flex-col items-center justify-center text-primary-container active:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[28px] mb-1">add_a_photo</span>
<span class="font-label-md text-label-md">Add More</span>
</button>
</div>
</section>
<!-- Video Section -->
<section class="bg-surface-container-lowest p-4 rounded-xl shadow-sm border border-surface-container-high">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center text-primary-container shrink-0">
<span class="material-symbols-outlined text-[24px]">videocam</span>
</div>
<div class="flex-1">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-1">Property Video <span class="text-on-surface-variant font-normal">(Optional)</span></h3>

<button class="inline-flex items-center gap-2 font-label-md text-label-md text-primary-container border-2 border-primary-container rounded-lg px-4 py-2 h-touch-target active:bg-primary-container/5 transition-colors">
