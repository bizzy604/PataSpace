<style>

            width: 1px;
            background-color: rgba(255, 255, 255, 0.4);
            height: 100%;
            position: absolute;
        }

            background-color: rgba(255, 255, 255, 0.4);

      min-height: max(884px, 100dvh);

<body class="bg-black text-white h-screen w-screen overflow-hidden flex flex-col font-body-md">
<!-- Camera Viewfinder (Simulated via image) -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A modern, high-quality, wide-angle interior photograph of a spacious living room in a luxury Kenyan apartment. Bright natural light pouring in from large windows, highlighting clean architectural lines, minimalist furniture, and a neutral color palette. The scene is slightly blurred to simulate an active camera viewfinder focusing on the space. 4k resolution." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxOaHcsPPuYOWBFXdm0xnRU2Q9B3ydVWnlTIOZepc9Dn7uWH5rPKly_7kITn3mHh81nBeReBhm9JedIDwKiM3jaA7MplysGt4U-dyEVjjlMBKRFwl9b1blnovcMCphL8r7pyH-QTyVs-CAe2PH0guIkKpAJd6R-MOv3gQ7ZCEE0cXQ5PCOED7oczUfnFDJHoP925PKeoet-SrkYWbBf0o2thmKHVzrDbL571qkpdj2dlL2v8FlEB1FYFhmGam0tWDkQHo8Dse-Qiih"/>
<!-- Rule of Thirds Grid -->
<div class="absolute inset-0 pointer-events-none">
<div class="grid-line-vertical left-1/3"></div>
<div class="grid-line-vertical left-2/3"></div>
<div class="grid-line-horizontal top-1/3"></div>
<div class="grid-line-horizontal top-2/3"></div>
</div>
</div>
<!-- Top Overlay Bar -->
<div class="relative z-10 w-full pt-safe bg-black/40 backdrop-blur-md">
<div class="flex items-center justify-between px-margin-horizontal h-14">
<button aria-label="Close camera" class="w-touch-target h-touch-target flex items-center justify-center -ml-2">
<span class="material-symbols-outlined text-white text-[28px]">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm text-white">Take Photos</h1>
<button aria-label="Toggle flash" class="w-touch-target h-touch-target flex items-center justify-center -mr-2">
<span class="material-symbols-outlined text-white text-[24px]">flash_auto</span>
</button>
</div>
<!-- Progress Bar -->
<div class="w-full bg-surface-variant/30 h-1">
<div class="bg-primary-container h-full w-1/3 transition-all duration-300"></div>
</div>
</div>
<!-- Spacer to push controls to bottom -->
<div class="flex-grow z-10 pointer-events-none"></div>
<!-- Bottom Controls Area -->
<div class="relative z-10 w-full bg-black/60 backdrop-blur-lg pb-safe">
<!-- Status Bar -->
<div class="flex items-center justify-between px-margin-horizontal py-4">
<div class="flex items-center gap-2 bg-black/50 px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-status-success text-[16px]" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-label-md text-label-md text-white">GPS Active</span>
</div>
<div class="bg-black/50 px-3 py-1.5 rounded-full">
<span class="font-label-md text-label-md text-white">5/15 photos</span>
</div>
</div>
<!-- Camera Controls -->
<div class="flex items-center justify-between px-8 pb-8 pt-4">
<!-- Gallery Thumbnail -->
<button class="w-12 h-12 rounded-lg overflow-hidden border-2 border-white/50 active:scale-95 transition-transform">
<img class="w-full h-full object-cover" data-alt="A small thumbnail showing the previously taken photo, which is a close-up of a modern kitchen counter with granite finish and a sleek faucet. Well-lit, high contrast." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaZZJJDN5n9oMA840c6cdWYNn9N87hu6PKl-mf7pw_avKr7JDIy8GKAPrj7CdNcqRnXv8N7Ez-TNJLSyz1xC6nc7ocASwZalcDP_SU7I9BkrEje_JIRdlOrI_zwYmdn2ZFtVZ60r8S3MgFvu6U_xXV-wiLYiuKgsyBD0WFSvTd2Xq7VSw-_dQfIUpHuCCBynXTOtj1p5V1QtkWNJLr4L3pgiqsb24Ths7E2PVSh5dsvBql-SCkjBvWHaJ3CaB2sSljY3f-TXqzbkbr"/>
</button>
<!-- Shutter Button -->
<button aria-label="Take photo" class="w-20 h-20 rounded-full border-4 border-white/30 flex items-center justify-center active:scale-95 transition-transform">
<div class="w-16 h-16 bg-white rounded-full"></div>
</button>
<!-- Flip Camera -->
<button aria-label="Flip camera" class="w-12 h-12 flex items-center justify-center bg-white/20 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-white text-[28px]">cameraswitch</span>
</button>
</div>
</div>
<script>
        // Simple script to handle shutter button animation feedback
        document.querySelector('button[aria-label="Take photo"]').addEventListener('click', function() {
            const innerShutter = this.querySelector('div');
            innerShutter.style.transform = 'scale(0.85)';
            innerShutter.style.backgroundColor = '#d1d5db'; // gray-300
            
            setTimeout(() => {
                innerShutter.style.transform = 'scale(1)';
                innerShutter.style.backgroundColor = 'white';
                
                // Simulate photo count update (visual only for prototype)
                const countBadge = document.querySelector('.bg-black\\/50 span:not(.material-symbols-outlined)');
                if(countBadge && countBadge.innerText === '5/15 photos') {
                    countBadge.innerText = '6/15 photos';
                    const progressBar = document.querySelector('.bg-primary-container');
                    progressBar.style.width = '40%';
                }
            }, 150);
            
            // Screen flash effect
            const flash = document.createElement('div');
            flash.className = 'absolute inset-0 bg-white z-50 pointer-events-none opacity-0 transition-opacity duration-75';
            document.body.appendChild(flash);
            
            // Trigger reflow
            void flash.offsetWidth;
            
            flash.style.opacity = '0.8';
            
            setTimeout(() => {
                flash.style.opacity = '0';
                setTimeout(() => flash.remove(), 75);
            }, 50);
        });
    </script>
</body></html>
