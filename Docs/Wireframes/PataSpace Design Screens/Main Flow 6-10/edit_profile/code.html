<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen flex flex-col">

<!-- Avatar Section -->

<script>
        // Simple script to handle Save button state based on input changes
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input:not([readonly]), textarea');
            const saveBtn = document.querySelector('header button:last-child');
            
            let initialValues = Array.from(inputs).map(input => input.value);

            inputs.forEach((input, index) => {
                input.addEventListener('input', () => {
                    const hasChanges = Array.from(inputs).some((inp, i) => inp.value !== initialValues[i]);
                    if (hasChanges) {
                        saveBtn.removeAttribute('disabled');
                        saveBtn.classList.remove('text-tertiary-fixed-dim', 'cursor-not-allowed');
                        saveBtn.classList.add('text-primary-container', 'cursor-pointer');
                    } else {
                        saveBtn.setAttribute('disabled', 'true');
                        saveBtn.classList.add('text-tertiary-fixed-dim', 'cursor-not-allowed');
                        saveBtn.classList.remove('text-primary-container', 'cursor-pointer');
                    }
                });
            });
        });
    </script>
