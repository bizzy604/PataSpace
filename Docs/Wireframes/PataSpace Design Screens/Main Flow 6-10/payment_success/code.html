<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Payment Successful - PataSpace</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* Success Animations */
        @keyframes drawCheck {
            0% { stroke-dashoffset: 100; opacity: 0; }
            20% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }
        
        @keyframes scaleUp {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeUp {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .animate-check-path {
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCheck 0.8s ease-out forwards;
            animation-delay: 0.2s;
        }

        .animate-circle-bg {
            animation: scaleUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .animate-fade-up-1 { animation: fadeUp 0.6s ease-out forwards; animation-delay: 0.4s; opacity: 0; }
        .animate-fade-up-2 { animation: fadeUp 0.6s ease-out forwards; animation-delay: 0.5s; opacity: 0; }
        .animate-fade-up-3 { animation: fadeUp 0.6s ease-out forwards; animation-delay: 0.6s; opacity: 0; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#434748",
                        "on-primary-fixed-variant": "#004e60",
                        "primary": "#00667e",

                        "error-container": "#ffdad6",

                        "surface-container-high": "#e8e8e8",
                        "status-success": "#34C759",

                        "on-surface-variant": "#3f484c",
                        "surface-tint": "#00677f",
                        "primary-fixed-dim": "#83d1ee",

                        "outline-variant": "#bec8cd",

                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "primary-container": "#28809a",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#c3c7c8",
                        "inverse-on-surface": "#f0f1f1",
                        "background": "#f9f9f9",
                        "on-tertiary-container": "#ffffff",
                        "status-warning": "#FFCC00",
                        "primary-fixed": "#b7eaff",
                        "inverse-surface": "#2f3131",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#181c1d",
                        "secondary-fixed": "#e4e2e1",
                        "tertiary-container": "#737778",
                        "surface-container-low": "#f3f3f4",
                        "surface-bright": "#f9f9f9",
                        "surface-subtle": "#EDEDED",
                        "on-primary-container": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "secondary-container": "#e4e2e1",
                        "surface-dim": "#dadada",
                        "secondary-fixed-dim": "#c8c6c5",
                        "secondary": "#5f5e5e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-horizontal": "16px",
                        "component-gap": "16px",
                        "touch-target": "44px",
                        "gutter-vertical": "24px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Poppins"],
                        "body-lg": ["DM Sans"],
                        "display-01": ["Poppins"],
                        "headline-lg-mobile": ["Poppins"],

                    "fontSize": {

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface-container-lowest text-on-surface antialiased h-screen w-screen overflow-hidden flex flex-col">
<!-- Top Navigation (Transactional Shell Suppression applied) -->
<header class="w-full flex justify-end items-center px-margin-horizontal h-14 shrink-0 pt-safe">
<button class="w-touch-target h-touch-target flex items-center justify-end text-on-surface hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0, 'wght' 400;">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-horizontal w-full max-w-md mx-auto">
<!-- Animated Success Checkmark -->
<div class="relative w-[140px] h-[140px] mb-8 animate-circle-bg flex items-center justify-center">
<!-- Background Blob/Circle -->
<div class="absolute inset-0 bg-primary-fixed rounded-full opacity-20"></div>
<div class="absolute inset-4 bg-primary-container rounded-full shadow-[0_0_40px_rgba(40,128,154,0.3)]"></div>
<!-- Check SVG -->
<svg class="relative z-10 w-16 h-16 text-on-primary-container" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" viewbox="0 0 24 24">
<polyline class="animate-check-path" points="20 6 9 17 4 12"></polyline>
</svg>
</div>
<!-- Heading -->
<h1 class="font-display-02 text-display-02 text-on-surface text-center mb-gutter-vertical animate-fade-up-1">
            Payment Successful!
        </h1>
<!-- Amount & Transaction Card (Glass/Tonal variant) -->
<div class="w-full bg-surface-container-low rounded-xl p-5 mb-component-gap flex flex-col items-center justify-center shadow-sm border border-outline-variant/30 animate-fade-up-2">
<p class="font-headline-md text-headline-md text-primary-container mb-1">5,000 Credits Added</p>
<p class="font-caption text-caption text-secondary tracking-wider uppercase">Transaction ID: MPE...61SV</p>
</div>
<!-- New Balance Card -->
<div class="w-full bg-surface-container-low rounded-xl p-6 mb-gutter-vertical flex flex-col items-center justify-center shadow-sm border border-outline-variant/30 animate-fade-up-2" style="animation-delay: 0.55s;">
<p class="font-label-md text-label-md text-secondary mb-2 uppercase tracking-wide">Your New Balance</p>
<p class="font-display-02 text-display-02 text-on-surface">10,000 KES</p>
</div>
<!-- View Receipt Action -->
<button class="flex items-center space-x-2 text-primary-container hover:text-primary transition-colors animate-fade-up-3 mb-8">
<span class="material-symbols-outlined text-[20px]">receipt_long</span>
<span class="font-label-md text-label-md underline underline-offset-4">View Receipt</span>
</button>
</main>
<!-- Bottom Actions -->
<footer class="w-full px-margin-horizontal pb-safe pt-4 flex flex-col space-y-3 shrink-0 max-w-md mx-auto animate-fade-up-3" style="animation-delay: 0.7s;">
<button class="w-full h-14 bg-primary-container text-on-primary-container rounded-full font-headline-sm text-headline-sm flex items-center justify-center active:scale-95 transition-transform shadow-md">
            Start Browsing
        </button>
<button class="w-full h-14 text-secondary rounded-full font-headline-sm text-headline-sm flex items-center justify-center hover:bg-surface-container-high transition-colors">
            Done
        </button>
</footer>
</body></html>
