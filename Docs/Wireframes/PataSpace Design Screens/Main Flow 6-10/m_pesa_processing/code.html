<style>
        .loading-ring {
            width: 120px;
            height: 120px;
        }
        
        .loading-ring svg {
            animation: rotate 2s linear infinite;
            transform-origin: center center;
            width: 100%;
            height: 100%;
        }
        
        .loading-ring circle {
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
            stroke-linecap: round;
        }
        
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35px;
            }
            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124px;
            }
        }

        .fade-text {
            animation: fadeInOut 4s infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            10%, 90% { opacity: 1; }
        }
    </style>

<body class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col pt-safe-top pb-safe-bottom md:hidden overflow-hidden">
<!-- Top Navigation Shell (Transaction Context) -->
<header class="bg-inverse-surface w-full z-50 flex justify-center items-center px-margin-horizontal h-touch-target rounded-b-xl shadow-lg relative shrink-0">
<!-- Title centered -->
<h1 class="font-headline-sm text-headline-sm text-primary-container">Processing Payment</h1>
</header>
<!-- Main Canvas Area -->
<main class="flex-1 flex flex-col items-center justify-center px-margin-horizontal w-full">
<!-- Loading Animation Area -->
<div class="relative w-full flex flex-col items-center justify-center mb-gutter-vertical">
<!-- Central Loading Ring -->
<div class="loading-ring relative flex items-center justify-center mb-8">
<!-- SVG Spinner -->
<svg class="absolute inset-0" viewbox="25 25 50 50">
<circle class="text-primary-container" cx="50" cy="50" fill="none" r="20" stroke="currentColor" stroke-width="4"></circle>
</svg>
<!-- Central Icon -->
<span class="material-symbols-outlined text-primary-container" style="font-size: 40px; font-variation-settings: 'FILL' 0;">
                    smartphone
                </span>
<!-- Overlay Pulse Effect -->
<div class="absolute inset-0 rounded-full bg-primary-container opacity-10 animate-ping"></div>
</div>
<!-- Dynamic Status Messages container -->
<div class="h-[60px] flex items-center justify-center text-center px-4 w-full">
<p class="font-headline-sm text-headline-sm text-on-surface transition-opacity duration-300" id="status-message">
                    STK prompt sent to your phone
                </p>
</div>
<!-- Contextual Help -->
<div class="text-center mt-unit">
<p class="font-body-md text-body-md text-secondary mb-1">Check your phone for the M-Pesa prompt</p>
<p class="font-caption text-caption text-outline">This usually takes <span class="font-bold" id="countdown">30</span> seconds</p>
</div>
</div>
</main>
<!-- Bottom Actions Area (Sticky to bottom) -->
<footer class="w-full px-margin-horizontal pb-[calc(16px+env(safe-area-inset-bottom))] shrink-0 flex flex-col items-center gap-component-gap">
<!-- Action Link -->
<button class="font-label-md text-label-md text-primary-container hover:opacity-80 transition-opacity active:scale-95 px-4 py-2 h-touch-target">
            Having trouble?
        </button>
<!-- Secondary Button -->
<button class="w-full h-[52px] rounded-full border-2 border-outline-variant text-secondary font-headline-sm text-headline-sm bg-surface-lowest hover:bg-surface-subtle transition-colors active:scale-95 flex items-center justify-center">
            Cancel Payment
        </button>
</footer>
<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Status Message Rotation
            const messages = [
                "STK prompt sent to your phone",
                "Waiting for PIN entry...",
                "Processing payment..."
            ];
            const statusEl = document.getElementById('status-message');
            let messageIndex = 0;
            
            setInterval(() => {
                // Fade out
                statusEl.style.opacity = '0';
                
                setTimeout(() => {
                    // Change text and fade in
                    messageIndex = (messageIndex + 1) % messages.length;
                    statusEl.textContent = messages[messageIndex];
                    statusEl.style.opacity = '1';
                }, 300); // Wait for fade out to complete
                
            }, 4000); // Change message every 4 seconds

            // Simple Countdown Timer
            const countdownEl = document.getElementById('countdown');
            let timeLeft = 30;
            
            const timer = setInterval(() => {
                timeLeft--;
                countdownEl.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    countdownEl.textContent = "a moment";
                }
            }, 1000);
        });
    </script>
