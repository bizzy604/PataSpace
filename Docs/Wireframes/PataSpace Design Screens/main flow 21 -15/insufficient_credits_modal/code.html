<style>
        .backdrop-blur-md {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        
        /* Modal animation classes */
        .modal-enter {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }
        .modal-enter-active {
            opacity: 1;
            transform: scale(1) translateY(0);
            transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1), transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .backdrop-enter {
            opacity: 0;
        }
        .backdrop-enter-active {
            opacity: 1;
            transition: opacity 300ms ease-out;
        }
    </style>

    body {

<body class="bg-background text-on-background antialiased h-screen w-screen overflow-hidden flex items-center justify-center">
<!-- Dimmed Backdrop with Blur Effect -->
<div aria-hidden="true" class="fixed inset-0 bg-surface-dim/70 backdrop-blur-md z-40 backdrop-enter-active" id="modal-backdrop"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-sm mx-margin-horizontal px-margin-horizontal flex items-center justify-center">
<!-- Modal Dialog -->
<div aria-labelledby="modal-title" aria-modal="true" class="bg-surface-container-lowest rounded-modal shadow-[0px_16px_32px_rgba(0,0,0,0.12),0px_4px_8px_rgba(0,0,0,0.06)] p-gutter-vertical w-full flex flex-col items-center text-center modal-enter-active" id="modal-dialog" role="dialog">
<!-- Icon Wrapper -->
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center mb-component-gap">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 0, 'wght' 300;">
                    account_balance_wallet
                </span>
</div>
<!-- Heading -->
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-2" id="modal-title">
                Insufficient Credits
            </h2>
<!-- Body Text -->
<p class="font-body-md text-body-md text-on-surface-variant mb-gutter-vertical px-2">
                You need <span class="font-bold text-on-surface">2,000 KES</span> to unlock this contact. Your current balance is <span class="font-bold text-on-surface">500 KES</span>.
            </p>
<!-- Actions Container -->
<div class="w-full flex flex-col gap-unit">
<!-- Primary Action: Top Up Wallet -->
<button class="w-full h-touch-target bg-primary-container hover:bg-primary text-on-primary-container rounded-xl font-headline-sm text-[16px] leading-[20px] transition-colors active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest flex items-center justify-center">
                    Top Up Wallet
                </button>
<!-- Secondary Action: Maybe Later -->
<button class="w-full h-touch-target bg-transparent hover:bg-surface-variant text-on-surface-variant rounded-xl font-headline-sm text-[16px] leading-[20px] transition-colors active:scale-[0.98] focus:outline-none flex items-center justify-center" id="close-modal-btn">
                    Maybe Later
                </button>
</div>
</div>
</div>
<script>
        // Simple interaction script to demonstrate closing the modal
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.getElementById('close-modal-btn');
            const backdrop = document.getElementById('modal-backdrop');
            const dialog = document.getElementById('modal-dialog');
            
            const closeModal = () => {
                // Apply exit animations
                backdrop.style.opacity = '0';
                dialog.style.opacity = '0';
                dialog.style.transform = 'scale(0.95) translateY(10px)';
                
                // In a real app, this would remove the element or hide it via a state manager
                setTimeout(() => {
                    console.log('Modal closed');
                    // Reset for demo purposes
                    setTimeout(() => {
                        backdrop.style.opacity = '1';
                        dialog.style.opacity = '1';
                        dialog.style.transform = 'scale(1) translateY(0)';
                    }, 1000);
                }, 300);
            };
            
            closeBtn.addEventListener('click', closeModal);
            backdrop.addEventListener('click', closeModal);
        });
    </script>
