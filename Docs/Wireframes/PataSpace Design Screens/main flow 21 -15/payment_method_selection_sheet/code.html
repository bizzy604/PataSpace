<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Select Payment Method</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=Poppins:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#5f5e5e",
                        "on-tertiary-fixed": "#181c1d",
                        "status-error": "#FF3B30",
                        "on-tertiary-fixed-variant": "#434748",
                        "inverse-primary": "#83d1ee",
                        "tertiary-fixed": "#e0e3e4",
                        "on-primary-fixed": "#001f28",
                        "primary-container": "#28809a",
                        "surface-bright": "#f9f9f9",
                        "tertiary-fixed-dim": "#c3c7c8",
                        "tertiary": "#5a5e5f",
                        "error": "#ba1a1a",
                        "on-primary-container": "#ffffff",
                        "surface": "#f9f9f9",
                        "primary-fixed-dim": "#83d1ee",
                        "surface-container": "#eeeeee",
                        "secondary-container": "#e4e2e1",
                        "on-tertiary": "#ffffff",
                        "primary": "#00667e",
                        "on-secondary-container": "#656464",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#1b1c1c",
                        "surface-tint": "#00677f",
                        "outline": "#6f797d",
                        "status-success": "#34C759",
                        "inverse-on-surface": "#f0f1f1",
                        "surface-container-high": "#e8e8e8",
                        "on-secondary-fixed-variant": "#474746",
                        "on-background": "#1a1c1c",
                        "surface-subtle": "#EDEDED",
                        "on-tertiary-container": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "surface-container-low": "#f3f3f4",
                        "status-warning": "#FFCC00",
                        "inverse-surface": "#2f3131",
                        "outline-variant": "#bec8cd",
                        "surface-container-highest": "#e2e2e2",
                        "primary-fixed": "#b7eaff",
                        "secondary-fixed": "#e4e2e1",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#3f484c",
                        "on-error": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "background": "#f9f9f9",
                        "tertiary-container": "#737778",
                        "on-primary-fixed-variant": "#004e60",
                        "on-surface": "#1a1c1c",
                        "surface-dim": "#dadada"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-horizontal": "16px",
                        "unit": "8px",
                        "touch-target": "44px",
                        "gutter-vertical": "24px",
                        "component-gap": "16px"
                    },
                    "fontFamily": {
                        "caption": ["DM Sans"],
                        "body-lg": ["DM Sans"],
                        "headline-md": ["Poppins"],
                        "headline-lg": ["Poppins"],
                        "display-02": ["Poppins"],
                        "display-01": ["Poppins"],
                        "body-md": ["DM Sans"],
                        "headline-lg-mobile": ["Poppins"],
                        "label-md": ["DM Sans"],
                        "headline-sm": ["Poppins"]
                    },
                    "fontSize": {
                        "caption": ["11px", { "lineHeight": "14px", "fontWeight": "400" }],
                        "body-lg": ["17px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "30px", "fontWeight": "600" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "display-02": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "display-01": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["15px", { "lineHeight": "21px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "30px", "fontWeight": "700" }],
                        "label-md": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "headline-sm": ["20px", { "lineHeight": "25px", "fontWeight": "600" }]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim h-screen w-full flex items-end justify-center relative overflow-hidden font-body-md text-on-surface">
<!-- Backdrop -->
<div class="absolute inset-0 bg-on-surface/40 backdrop-blur-sm z-40 transition-opacity duration-300"></div>
<!-- Bottom Sheet Modal -->
<div class="bg-surface-container-lowest w-full md:w-[400px] rounded-t-3xl shadow-[0px_-8px_24px_rgba(0,0,0,0.12)] z-50 transform transition-transform duration-300 translate-y-0 pb-safe">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-unit pb-component-gap">
<div class="w-12 h-1.5 bg-outline-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-margin-horizontal pb-component-gap">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Payment Method</h2>
</div>
<!-- Payment Options List -->
<div class="px-margin-horizontal space-y-unit pb-gutter-vertical">
<!-- Option 1: M-Pesa (Selected) -->
<label class="flex items-center p-component-gap bg-surface border-2 border-primary-container rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex-shrink-0 w-10 h-10 bg-status-success/10 rounded-full flex items-center justify-center mr-component-gap">
<span class="material-symbols-outlined text-status-success" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="flex-grow">
<div class="font-body-lg text-body-lg font-medium text-on-surface">M-Pesa</div>
<div class="font-caption text-caption text-on-surface-variant">Instant processing</div>
</div>
<div class="flex-shrink-0 ml-component-gap">
<input checked="" class="w-6 h-6 text-primary-container border-outline-variant focus:ring-primary-container focus:ring-offset-surface" name="payment_method" type="radio" value="mpesa"/>
</div>
</label>
<!-- Option 2: Credit/Debit Card (Disabled) -->
<label class="flex items-center p-component-gap bg-surface border border-outline-variant rounded-xl opacity-60 cursor-not-allowed">
<div class="flex-shrink-0 w-10 h-10 bg-surface-container rounded-full flex items-center justify-center mr-component-gap">
<span class="material-symbols-outlined text-outline">credit_card</span>
</div>
<div class="flex-grow">
<div class="flex items-center">
<div class="font-body-lg text-body-lg font-medium text-on-surface mr-2">Credit/Debit Card</div>
<span class="px-2 py-0.5 bg-secondary-container text-on-secondary-container font-caption text-caption rounded-full">Coming soon</span>
</div>
</div>
<div class="flex-shrink-0 ml-component-gap">
<input class="w-6 h-6 border-outline-variant text-outline bg-surface-container" disabled="" name="payment_method" type="radio" value="card"/>
</div>
</label>
<!-- Option 3: PataSpace Credits -->
<label class="flex items-center p-component-gap bg-surface border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors">
<div class="flex-shrink-0 w-10 h-10 bg-primary-container/10 rounded-full flex items-center justify-center mr-component-gap">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">monetization_on</span>
</div>
<div class="flex-grow">
<div class="font-body-lg text-body-lg font-medium text-on-surface">PataSpace Credits</div>
<div class="font-caption text-caption text-primary-container font-medium">Balance: 5,000 KES</div>
</div>
<div class="flex-shrink-0 ml-component-gap">
<input class="w-6 h-6 text-primary-container border-outline-variant focus:ring-primary-container focus:ring-offset-surface" name="payment_method" type="radio" value="credits"/>
</div>
</label>
</div>
<!-- Action Button (Sticky Footer) -->
<div class="px-margin-horizontal pt-unit pb-gutter-vertical border-t border-outline-variant bg-surface-container-lowest">
<button class="w-full h-touch-target bg-primary-container text-on-primary-container font-headline-sm text-label-md rounded-lg flex items-center justify-center shadow-sm active:scale-95 transition-transform">
                Confirm Payment
            </button>
</div>
</div>
<!-- Safe area padding for standalone mobile web if needed, handled by pb-safe utility theoretically, injecting raw style just in case for iOS -->
<style>
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 24px); }
    </style>
</body></html>
