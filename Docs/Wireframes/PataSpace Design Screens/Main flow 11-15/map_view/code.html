<script>
        // Simple logic to toggle bottom sheet expansion
        const bottomSheet = document.getElementById('bottomSheet');
        const dragHandle = document.getElementById('dragHandle');
        const horizontalCards = document.getElementById('horizontalCards');
        const verticalList = document.getElementById('verticalList');
        let isExpanded = false;

        dragHandle.addEventListener('click', () => {
            isExpanded = !isExpanded;
            if (isExpanded) {
                bottomSheet.classList.add('expanded');
                bottomSheet.style.height = 'calc(100% - env(safe-area-inset-top, 44px) - 60px)';
                horizontalCards.classList.add('hidden');
                verticalList.classList.remove('hidden');
            } else {
                bottomSheet.classList.remove('expanded');
                bottomSheet.style.height = 'auto';
                horizontalCards.classList.remove('hidden');
                verticalList.classList.add('hidden');
            }
        });
    </script>
