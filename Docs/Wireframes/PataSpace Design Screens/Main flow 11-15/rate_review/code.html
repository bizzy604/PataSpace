<style>
        body {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Custom Toggle Switch Styles */
        .toggle-checkbox:checked {
            right: 0;
            border-color: theme('colors.primary-container');
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: theme('colors.primary-container');
        }
        .toggle-checkbox {
            right: 4px;
            z-index: 1;
            border-color: #e2e8f0;
            transition: all 0.3s;
        }
        .toggle-label {
            background-color: #e2e8f0;
            transition: all 0.3s;
        }
        
        /* Star Animation */
        .star-icon {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s ease;
        }
        .star-icon:active {
            transform: scale(0.8);
        }
        .star-filled {
            font-variation-settings: 'FILL' 1;
            color: theme('colors.status-warning');
        }
    </style>

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col pt-safe-top pb-safe-bottom">
<!-- Top Navigation (Transactional/Task-Focused so standard nav shell is suppressed, using custom header) -->
<header class="flex items-center justify-between px-margin-horizontal h-touch-target bg-transparent shrink-0">
<div class="w-10"></div> <!-- Spacer for centering -->
<h1 class="font-headline-sm text-headline-sm text-on-surface text-center flex-1">Rate Your Experience</h1>
<button aria-label="Close" class="w-10 h-10 flex items-center justify-end text-on-surface-variant hover:opacity-80 active:scale-95 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-horizontal overflow-y-auto pb-gutter-vertical">
<!-- Property Summary Card (Layer 1) -->
<section class="mt-gutter-vertical bg-white rounded-xl shadow-sm p-4 flex items-center gap-4">
<div class="w-16 h-16 rounded-lg overflow-hidden shrink-0 bg-surface-container-low">
<img alt="Property Image" class="w-full h-full object-cover" data-alt="A brightly lit modern apartment interior featuring a minimalist living room with white walls, a plush grey sofa, and large floor-to-ceiling windows letting in natural sunlight. The aesthetic is clean, premium, and airy, suitable for a high-end real estate listing." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKz9bDcOt3t3ydZgdVokTbutsYQSm6-EAw5GWAYg2UzYdVgy1TpMFV7eH-1lO35hdzaNUAfFI0uSCPnlhqbc_D3APKm84-xH-r8trcrXao9XHwqEpyrC93ULbX65A_79v2GBlIl57qz4UaeaxlKgOlFKmvFcSDzhmPgjnl-eUKdqygMVxn7fKHdaXl3HLXdgFR4FHNK_EPIYtI47_K8o5RcYo3Aya3lynhcUdAKd3yYM6oAt5r166eUj1ukv3R6uvGU65M15d9BWcp"/>
</div>
<div class="flex flex-col justify-center">
<h2 class="font-body-lg text-body-lg text-on-surface font-semibold line-clamp-1">The Azure Residences</h2>
<p class="font-body-md text-body-md text-on-surface-variant line-clamp-1">Westlands, Nairobi</p>
<div class="flex items-center gap-1 mt-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[14px]">calendar_today</span>
<span class="font-caption text-caption">Oct 12 - Oct 15</span>
</div>
</div>
</section>
<!-- Interactive Rating Section -->
<section class="mt-8 flex flex-col items-center">

<div class="flex items-center justify-center gap-2 mb-4" id="star-container">
<!-- Stars will be handled by JS -->
<button class="w-12 h-12 flex items-center justify-center focus:outline-none star-btn" data-value="1">
<span class="material-symbols-outlined text-[40px] text-surface-variant star-icon">star</span>
</button>

<span class="material-symbols-outlined text-[40px] text-surface-variant star-icon">star</span>
</button>
<button class="w-12 h-12 flex items-center justify-center focus:outline-none star-btn" data-value="3">
<span class="material-symbols-outlined text-[40px] text-surface-variant star-icon">star</span>
</button>
<button class="w-12 h-12 flex items-center justify-center focus:outline-none star-btn" data-value="4">
<span class="material-symbols-outlined text-[40px] text-surface-variant star-icon">star</span>
</button>
<button class="w-12 h-12 flex items-center justify-center focus:outline-none star-btn" data-value="5">
<span class="material-symbols-outlined text-[40px] text-surface-variant star-icon">star</span>
</button>

<!-- Dynamic Rating Label -->

</div>
</section>

<span class="font-caption text-caption text-on-surface-variant">Hide your name from public view</span>
</div>
<!-- Custom Toggle -->
<div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer top-0 bottom-0 m-auto" id="anonymous-toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-6 rounded-full bg-surface-variant cursor-pointer" for="anonymous-toggle"></label>
</div>
</section>
<div class="flex-1 min-h-[40px]"></div> <!-- Spacer to push button to bottom -->
</main>
<!-- Bottom Sticky Action Bar (Layer 3) -->
<footer class="px-margin-horizontal pb-safe-bottom pt-4 bg-surface/80 backdrop-blur-md shrink-0 z-10 border-t border-surface-variant/30">
<button class="w-full h-touch-target bg-primary-container text-white font-display-01 text-[17px] font-bold rounded-xl flex items-center justify-center mb-6 active:scale-[0.98] transition-transform opacity-50 cursor-not-allowed" disabled="" id="submit-btn">
            Submit Review
        </button>
</footer>
<!-- Interactive Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const starBtns = document.querySelectorAll('.star-btn');
            const ratingLabel = document.getElementById('rating-label');
            const submitBtn = document.getElementById('submit-btn');
            let currentRating = 0;

            const ratingTexts = {
                1: "Terrible",
                2: "Poor",
                3: "Okay",
                4: "Good",
                5: "Amazing!"
            };

            function updateStars(rating) {
                starBtns.forEach((btn, index) => {
                    const icon = btn.querySelector('.star-icon');
                    if (index < rating) {
                        icon.classList.add('star-filled');
                        icon.classList.remove('text-surface-variant');
                    } else {
                        icon.classList.remove('star-filled');
                        icon.classList.add('text-surface-variant');
                    }
                });
            }

            starBtns.forEach(btn => {
                // Hover effects (mostly for web testing, as mobile won't hover well)
                btn.addEventListener('mouseenter', () => {
                    if(currentRating === 0) {
                        updateStars(parseInt(btn.dataset.value));
                    }
                });

                btn.parentElement.addEventListener('mouseleave', () => {
                    if(currentRating === 0) {
                        updateStars(0);
                    } else {
                        updateStars(currentRating);
                    }
                });

                // Click event
                btn.addEventListener('click', () => {
                    currentRating = parseInt(btn.dataset.value);
                    updateStars(currentRating);
                    
                    // Update Label
                    ratingLabel.textContent = ratingTexts[currentRating];
                    ratingLabel.classList.remove('opacity-0');
                    
                    // Enable Submit
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                });
            });
        });
    </script>
