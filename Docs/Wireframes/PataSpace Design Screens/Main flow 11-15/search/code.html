<!DOCTYPE html>

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-lowest text-on-surface font-body-md min-h-screen pb-[90px] antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Sticky iOS Search Header -->
<header class="sticky top-0 z-40 bg-surface-container-lowest/90 backdrop-blur-md pt-12 pb-4 px-margin-horizontal shadow-sm">
<div class="flex items-center gap-3">
<!-- Search Bar -->
<div class="flex-1 h-touch-target bg-surface-subtle rounded-xl flex items-center px-4 gap-2 focus-within:ring-2 focus-within:ring-primary transition-shadow duration-200">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="search">search</span>
<input autofocus="" class="w-full bg-transparent border-none p-0 focus:ring-0 font-body-md text-body-md text-on-surface placeholder:text-outline" placeholder="Search neighborhoods, cities..." type="text"/>
</div>
<!-- Filter Button -->
<button class="w-touch-target h-touch-target flex items-center justify-center bg-surface-subtle rounded-full text-primary hover:bg-surface-variant active:scale-95 transition-all duration-150 flex-shrink-0">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="px-margin-horizontal py-gutter-vertical flex flex-col gap-8">
<!-- Recent Searches Section -->
<section class="flex flex-col gap-component-gap">
<h2 class="font-headline-sm text-headline-sm text-on-surface flex items-center justify-between">
                Recent Searches
                <button class="font-label-md text-label-md text-primary bg-primary-container/10 px-3 py-1 rounded-full hover:bg-primary-container/20 transition-colors">Clear</button>
</h2>
<div class="flex flex-col">
<!-- Recent Item 1 -->
<button class="flex items-center justify-between py-3 border-b border-surface-variant hover:bg-surface-container-low transition-colors px-2 -mx-2 rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="history">history</span>
<span class="font-body-md text-body-md text-on-surface">Kileleshwa, 3 Bed Apartments</span>
</div>
<span class="material-symbols-outlined text-outline-variant text-[18px]" data-icon="close">close</span>
</button>
<!-- Recent Item 2 -->
<button class="flex items-center justify-between py-3 border-b border-surface-variant hover:bg-surface-container-low transition-colors px-2 -mx-2 rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="history">history</span>
<span class="font-body-md text-body-md text-on-surface">Karen, Standalone Houses</span>
</div>
<span class="material-symbols-outlined text-outline-variant text-[18px]" data-icon="close">close</span>
</button>
<!-- Recent Item 3 -->
<button class="flex items-center justify-between py-3 hover:bg-surface-container-low transition-colors px-2 -mx-2 rounded-lg">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline" data-icon="history">history</span>
<span class="font-body-md text-body-md text-on-surface">Runda, Under 150k</span>
</div>
<span class="material-symbols-outlined text-outline-variant text-[18px]" data-icon="close">close</span>
</button>
</div>
</section>
<!-- Popular Neighborhoods Section -->
<section class="flex flex-col gap-component-gap">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Popular Neighborhoods</h2>
<div class="flex flex-col gap-3">
<!-- Neighborhood Card 1 -->
<button class="flex items-center justify-between p-3 bg-surface rounded-xl shadow-[0_0_8px_rgba(0,0,0,0.04)] border border-surface-variant active:scale-[0.98] transition-transform text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-medium">Kilimani</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Neighborhood Card 2 -->
<button class="flex items-center justify-between p-3 bg-surface rounded-xl shadow-[0_0_8px_rgba(0,0,0,0.04)] border border-surface-variant active:scale-[0.98] transition-transform text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-medium">Westlands</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Neighborhood Card 3 -->
<button class="flex items-center justify-between p-3 bg-surface rounded-xl shadow-[0_0_8px_rgba(0,0,0,0.04)] border border-surface-variant active:scale-[0.98] transition-transform text-left">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<span class="font-body-lg text-body-lg text-on-surface font-medium">Lavington</span>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar (Shared Component JSON Execution) -->
<nav class="bg-inverse-surface dark:bg-inverse-surface border-t border-outline-variant/10 shadow-lg fixed bottom-0 w-full z-50 pb-safe">
<div class="flex justify-around items-center h-16 w-full max-w-screen-xl mx-auto px-2">
<!-- Home (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity active:scale-90 transition-transform w-16">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</button>
<!-- Search (Active) -->
<button class="flex flex-col items-center justify-center text-primary-fixed-dim bg-primary-container/20 rounded-xl px-3 py-1 hover:text-primary-fixed hover:opacity-80 transition-opacity active:scale-90 transition-transform min-w-[64px]">
<span class="material-symbols-outlined mb-1" data-icon="search" data-weight="fill" style="font-variation-settings: 'FILL' 1;">search</span>
<span class="font-label-md text-label-md font-bold">Search</span>
</button>
<!-- List (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity active:scale-90 transition-transform w-16">
<span class="material-symbols-outlined mb-1" data-icon="add_circle">add_circle</span>
<span class="font-label-md text-label-md">List</span>
</button>
<!-- Saved (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity active:scale-90 transition-transform w-16">
<span class="material-symbols-outlined mb-1" data-icon="favorite">favorite</span>
<span class="font-label-md text-label-md">Saved</span>
</button>
<!-- Profile (Inactive) -->
<button class="flex flex-col items-center justify-center text-secondary-fixed-dim hover:text-primary-fixed hover:opacity-80 transition-opacity active:scale-90 transition-transform w-16">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</button>
</div>
</nav>
</body></html>
