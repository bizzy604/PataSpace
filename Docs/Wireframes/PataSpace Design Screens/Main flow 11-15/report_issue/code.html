<body class="bg-background text-on-background font-body-md ios-scroll min-h-screen flex flex-col pt-safe pb-safe pb-[80px]">
<!-- Top Navigation (Transactional View - Suppressing standard Shell) -->

</button>
<h1 class="font-headline-sm text-headline-sm text-on-surface truncate px-2">Report Issue</h1>
<div class="w-touch-target h-touch-target"></div> <!-- Spacer for center alignment -->
</div>
</header>
<!-- Main Content Canvas -->

<p class="font-body-md text-body-md text-on-surface-variant truncate">Ref: KES-8921-X</p>

<option disabled="" selected="" value="">Select an issue type</option>

<option value="payment">Payment issue</option>

</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">

<div class="aspect-square bg-surface-container-low rounded-xl border border-surface-container-high flex items-center justify-center opacity-50">

</div>
</div>

</section>

<section class="bg-primary-container/10 border border-primary-container/30 rounded-xl p-4 flex gap-3 items-start shadow-sm">
<span class="material-symbols-outlined text-primary fill flex-shrink-0 mt-0.5">info</span>
<div class="flex-1">
<h3 class="font-label-md text-label-md text-primary mb-1">Important</h3>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed">

                    </p>

<div class="fixed bottom-0 left-0 right-0 bg-surface/90 backdrop-blur-md border-t border-surface-container-high pb-safe z-50">

<span class="material-symbols-outlined text-lg">send</span>
</button>

<script>
        // Character count logic
        const textarea = document.getElementById('description');
        const charCountDisplay = document.getElementById('char-count');
        const maxLength = textarea.getAttribute('maxlength');

        textarea.addEventListener('input', function() {
            const currentLength = this.value.length;
            charCountDisplay.textContent = `${currentLength}/${maxLength}`;
            
            if (currentLength >= maxLength - 10) {
                charCountDisplay.classList.add('text-status-warning');
            } else {
                charCountDisplay.classList.remove('text-status-warning', 'text-status-error');
            }
            
            if (currentLength >= maxLength) {
                charCountDisplay.classList.add('text-status-error');
                charCountDisplay.classList.remove('text-status-warning');
            }
        });
    </script>
