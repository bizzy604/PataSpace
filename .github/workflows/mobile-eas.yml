name: Mobile EAS Build

# Builds (and optionally submits) the Expo mobile app via EAS Build / EAS Submit.
#  - Manual run (workflow_dispatch): choose platform, profile, and whether to submit.
#  - Pushing a `mobile-v*` tag: builds the production profile for both platforms
#    and auto-submits to the stores.
# Requires repo secret EXPO_TOKEN (an Expo access token). Per-environment app
# values (EXPO_PUBLIC_*) live as EAS environment variables, NOT GitHub secrets —
# see apps/mobile/STORE_RELEASE.md.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options: [all, android, ios]
        default: all
      profile:
        description: EAS build profile
        type: choice
        options: [production, preview]
        default: production
      submit:
        description: Auto-submit to the stores after a successful build
        type: boolean
        default: false
  push:
    tags: ['mobile-v*']

concurrency:
  # Never cancel an in-flight release build; queue instead.
  group: mobile-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # app.config.ts is evaluated by the EAS CLI, so workspace deps must resolve.
      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve build parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "platform=all"     >> "$GITHUB_OUTPUT"
            echo "profile=production" >> "$GITHUB_OUTPUT"
            echo "submit=true"       >> "$GITHUB_OUTPUT"
          else
            echo "platform=${{ inputs.platform }}" >> "$GITHUB_OUTPUT"
            echo "profile=${{ inputs.profile }}"   >> "$GITHUB_OUTPUT"
            echo "submit=${{ inputs.submit }}"     >> "$GITHUB_OUTPUT"
          fi

      - name: EAS build
        working-directory: apps/mobile
        run: |
          extra=""
          if [ "${{ steps.params.outputs.submit }}" = "true" ]; then
            extra="--auto-submit"
          fi
          eas build \
            --platform "${{ steps.params.outputs.platform }}" \
            --profile "${{ steps.params.outputs.profile }}" \
            --non-interactive \
            --no-wait \
            $extra
