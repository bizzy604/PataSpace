# Purpose: Automated dependency update PRs so new advisories surface and get
#   patched instead of accumulating (the audit found 4 critical / 68 high).
# Why important: Without this, a fresh critical CVE ships silently.
# Used by: GitHub Dependabot.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # Expo-SDK-coupled packages only move together with an `expo` SDK
      # upgrade (npx expo install --fix), never independently. Dependabot
      # keeps proposing SDK 57 packages while apps/mobile is on SDK 54,
      # which would break the native runtime.
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: 'babel-preset-expo'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      # Prisma majors need a coordinated CLI + client migration, not an
      # auto-bump (PR #14 bumped the CLI to 7.x while the client stayed 5.x).
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      # apps/mobile must stay on tailwind 3 (nativewind 4 requires it); web
      # is already on 4, so blocking tailwind majors costs nothing.
      - dependency-name: 'tailwindcss'
        update-types: ['version-update:semver-major']
    groups:
      # Batch low-risk updates into single PRs to cut review noise; security
      # updates still come through regardless of these groups.
      dev-dependencies:
        dependency-type: development
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
