# Purpose: nginx config that serves the built admin SPA inside its container.
# Why important: Single-page apps need a history-API fallback so deep links
#   resolve to index.html instead of 404ing.
# Used by: apps/admin/Dockerfile (copied to /etc/nginx/conf.d/default.conf).

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed build assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback: unknown paths return the app shell.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
